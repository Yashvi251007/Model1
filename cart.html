<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="topbar">
        <p>FREE SHIPPING on orders above ₹2999</p>
    </div>

    <div class="navbar">
        <div class="logo">
            PALMONAS
        </div>
        <div class="menu">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact Us</a>
            <a href="login.html">Login</a>
            <a href="cart.html">Cart</a>
        </div>
    </div>

    <div class="title">
        <h1>My Shopping Cart</h1>
        <p>Your selected jewellery collection</p>
    </div>

    <div class="cart-summary">
        <div class="summary-box">
            <h2>Total Amount</h2>
            <h1 id="total">₹0</h1>
            <button class="checkout-btn">
                Proceed To Checkout
            </button>
        </div>
    </div>

    <div class="products" id="cart-products"></div>
   
    <div class="clear-cart">
        <button id="clear-cart">
            Clear Cart
        </button>
    </div>

   <div id="paymentModal" class="popup">

    <div class="login-box payment-box">

        <span class="close-popup"
        id="closePayment">
            &times;
        </span>

        <h1>Payment Method</h1>

        <p class="payment-text">
            Select how you want to pay
            for your order.
        </p>



        <!-- CARD -->

        <div class="payment-option">

            <input type="radio"
            name="paymentOpt"
            value="Card"
            checked
            onclick="showPaymentFields()">

            <label>
                Credit / Debit Card
            </label>

        </div>



        <!-- UPI -->

        <div class="payment-option">

            <input type="radio"
            name="paymentOpt"
            value="UPI"
            onclick="showPaymentFields()">

            <label>
                UPI (GPay / PhonePe)
            </label>

        </div>



        <!-- COD -->

        <div class="payment-option">

            <input type="radio"
            name="paymentOpt"
            value="COD"
            onclick="showPaymentFields()">

            <label>
                Cash On Delivery
            </label>

        </div>



        <!-- CARD DETAILS -->

        <div id="cardFields">

            <input type="text"
            placeholder="Card Holder Name">

            <input type="text"
            placeholder="Card Number">

            <div class="card-row">

                <input type="text"
                placeholder="MM/YY">

                <input type="text"
                placeholder="CVV">

            </div>

        </div>



        <!-- UPI DETAILS -->

        <div id="upiFields"
        style="display:none;">

            <input type="text"
            placeholder="Enter UPI ID">

        </div>



        <button id="confirmPayBtn">
            Confirm & Pay
        </button>

    </div>

</div>
    <div class="footer">
        <h2>PALMONAS</h2>
        <p>Luxury Jewellery Collection</p>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>


    <script src="script.js"></script>
</body>
</html>
